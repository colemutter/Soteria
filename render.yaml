services:
  - type: keyvalue
    name: soteria-redis
    region: ohio
    plan: starter
    maxmemoryPolicy: noeviction
    ipAllowList: []

  - type: web
    name: soteria-backend
    runtime: docker
    region: ohio
    plan: starter
    dockerfilePath: ./src/backend/Dockerfile.web
    dockerContext: ./src/backend
    healthCheckPath: /healthz
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: CLAUDE_API_KEY
        sync: false
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: soteria-redis
          property: connectionString
      - key: FRONTEND_ORIGIN
        value: https://soteria-frontend-vcck.onrender.com
      - key: FRONTEND_ORIGINS
        value: https://soteria-frontend-vcck.onrender.com
      - key: FRONTEND_ORIGIN_REGEX
        value: 'https://.*\.onrender\.com'

  - type: worker
    name: soteria-poller
    runtime: docker
    region: ohio
    plan: starter
    dockerfilePath: ./src/backend/Dockerfile.poller
    dockerContext: ./src/backend
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: CLAUDE_API_KEY
        sync: false
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: soteria-redis
          property: connectionString
      - key: SOTERIA_REACTION_SERVICE_URL
        value: https://soteria-backend-7360.onrender.com/api/poller/report
      - key: SOTERIA_REACTION_SERVICE_TIMEOUT_SECONDS
        value: "420"

  - type: web
    name: soteria-frontend
    runtime: static
    buildCommand: cd src/frontend && npm ci && npm run build
    staticPublishPath: ./src/frontend/dist
    envVars:
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      # Base URL of the backend API. Inlined into the static bundle at BUILD time,
      # so a rebuild is required for changes to take effect. Required for adding/
      # restoring satellites (they persist via the backend, not Supabase directly).
      - key: VITE_API_BASE_URL
        value: https://soteria-backend-7360.onrender.com
